{% extends "base.html" %}

{% block title %}Verify Login OTP{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4">

                        Verify Login OTP

                    </h3>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <input
                                type="text"
                                name="otp"
                                maxlength="6"
                                class="form-control"
                                placeholder="Enter OTP"
                                required
                            >

                        </div>

                        <button class="btn btn-dark w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
