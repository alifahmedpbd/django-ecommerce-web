<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% block title %} {{ SHOP_NAME }} {% endblock %} | {{ SHOP_TAGLINE }}
    </title>

    <!-- Fonts: Space Grotesk (display), Inter (body), IBM Plex Mono (prices/specs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#F3F5FB",
              surface: "#FFFFFF",
              ink: "#0B1D33",
              inksoft: "#5B6B85",
              line: "#DCE3F0",
              accent: "#0B5FFF",
              accentink: "#083FAB",
              brass: "#B9862A",
              brasssoft: "#F4E9D2",
              good: "#0E9F6E",
            },
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"],
              body: ["Inter", "sans-serif"],
              mono: ['"IBM Plex Mono"', "monospace"],
            },
            borderRadius: {
              card: "22px",
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-bg text-ink font-body">
    {% include "partials/navbar.html" %}

    <main class="container mx-auto px-4 py-6 md:py-10">
      {% if messages %} {% for message in messages %}

      <div
        class="flex items-center justify-between gap-3 rounded-xl border border-line bg-surface px-4 py-3 mb-4 text-sm text-ink"
        role="alert"
      >
        <span>{{ message }}</span>

        <button
          type="button"
          class="text-inksoft hover:text-ink"
          onclick="this.closest('[role=alert]').remove()"
          aria-label="Dismiss"
        >
          ✕
        </button>
      </div>

      {% endfor %} {% endif %} {% block content %} {% endblock %}
    </main>

    {% include "partials/footer.html" %}
  </body>
</html>
