<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

</head>

<body style="font-family:Arial;background:#f5f5f5;padding:40px;">

<div style="max-width:650px;margin:auto;background:white;padding:40px;border-radius:12px;">

<h2 style="color:#0d6efd;">
🛒 New Order Received
</h2>

<hr>

<p>
A new customer has placed an order.
</p>

<h3>
Order #{{ order.id }}
</h3>

<p>

<b>Customer:</b>

{{ order.full_name }}

</p>

<p>

<b>Email:</b>

{{ order.email }}

</p>

<p>

<b>Phone:</b>

{{ order.phone }}

</p>

<p>

<b>Payment:</b>

{{ order.payment_method|title }}

</p>

<p>

<b>Total:</b>

${{ order.final_total }}

</p>

<p>

<b>Status:</b>

{{ order.status|title }}

</p>

<hr>

<a href="{{ site_url }}/dashboard/orders/"

style="background:#0d6efd;color:white;padding:12px 25px;text-decoration:none;border-radius:8px;">

Open Dashboard

</a>

</div>

</body>

</html>
