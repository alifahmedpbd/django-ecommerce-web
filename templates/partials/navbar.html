<!-- ======================================
     Bootstrap Navbar
====================================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <!-- ===========================
             Website Logo
        ============================ -->

        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            Django Ecommerce
        </a>

        <!-- ===========================
             Mobile Menu Button
        ============================ -->

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- ===========================
             Navbar Menu
        ============================ -->

        <div
            class="collapse navbar-collapse"
            id="navbarNav"
        >

            <!-- Left Menu -->

            <ul class="navbar-nav me-auto">

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="{% url 'home' %}"
                    >
                        Home
                    </a>

                </li>

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="{% url 'store:product_list' %}"
                    >
                        Products
                    </a>

                </li>

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="#"
                    >
                        Categories
                    </a>

                </li>

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="#"
                    >
                        Cart
                    </a>

                </li>

            </ul>

            <!-- Right Menu -->

            <ul class="navbar-nav">

                {% if user.is_authenticated %}

                    <!-- Profile Image -->

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="{% url 'accounts:profile' %}"
                        >

                            {% if user.profile_image %}

                                <img
                                    src="{{ user.profile_image.url }}"
                                    alt="Profile"
                                    width="40"
                                    height="40"
                                    class="rounded-circle"
                                    style="object-fit:cover;"
                                >

                            {% else %}

                                <img
                                    src="https://via.placeholder.com/40"
                                    alt="Profile"
                                    class="rounded-circle"
                                >

                            {% endif %}

                        </a>

                    </li>

                    <!-- Logout -->

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="{% url 'accounts:logout' %}"
                        >
                            Logout
                        </a>

                    </li>

                {% else %}

                    <!-- Login -->

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="{% url 'accounts:login' %}"
                        >
                            Login
                        </a>

                    </li>

                    <!-- Register -->

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="{% url 'accounts:register' %}"
                        >
                            Register
                        </a>

                    </li>

                {% endif %}

            </ul>

        </div>

    </div>

</nav>
