services:
  - type: web
    name: shopora
    env: python
    plan: free
    autoDeploy: true

    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    releaseCommand: "python manage.py migrate"

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: shopora-bd.onrender.com,localhost,127.0.0.1

      - key: CSRF_TRUSTED_ORIGINS
        value: https://shopora-bd.onrender.com

      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend

      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_USE_SSL
        value: "False"

      - key: EMAIL_HOST_USER
        value: shoporaweb@gmail.com

      - key: EMAIL_HOST_PASSWORD
        value: "YOUR_GMAIL_APP_PASSWORD"

      - key: DEFAULT_FROM_EMAIL
        value: "Shopora <shoporaweb@gmail.com>"

      - key: OWNER_EMAIL
        value: alifahmedpbd@gmail.com