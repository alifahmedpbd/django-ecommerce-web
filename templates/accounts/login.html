{% extends "base.html" %} {% block title %} Login {% endblock %} 

{% block content %}
<div class="max-w-md mx-auto py-4 md:py-16">
  <div
    class="bg-surface border border-line rounded-card shadow-xl p-5 sm:p-8 md:p-10"
  >
    <h2 class="font-display font-bold text-xl md:text-2xl text-center mb-1">
      Welcome Back
    </h2>

    <p class="text-inksoft text-center mb-5 md:mb-8 text-xs md:text-sm">
      Login to continue shopping on Shopora.
    </p>

    <form method="POST" class="space-y-3.5 md:space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-xs md:text-sm font-medium text-ink mb-1">
          Username
        </label>

        <input
          type="text"
          name="username"
          class="w-full rounded-xl border border-line bg-bg px-4 py-2.5 text-sm text-ink placeholder:text-inksoft focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent"
          placeholder="Enter Username"
          required
        />
      </div>

      <div>
        <label class="block text-xs md:text-sm font-medium text-ink mb-1">
          Password
        </label>

        <input
          type="password"
          name="password"
          class="w-full rounded-xl border border-line bg-bg px-4 py-2.5 text-sm text-ink placeholder:text-inksoft focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent"
          placeholder="Enter Password"
          required
        />
      </div>

      <div class="flex items-center justify-between text-xs md:text-sm">
        <a
          href="{% url 'accounts:forgot_password' %}"
          class="text-accent hover:text-accentink font-medium"
        >
          Forgot Password?
        </a>

        <a
          href="{% url 'accounts:email_login' %}"
          class="text-accent hover:text-accentink font-medium"
        >
          Login with OTP
        </a>
      </div>

      <button
        type="submit"
        class="w-full bg-accent hover:bg-accentink text-white font-semibold rounded-xl py-2.5 md:py-3 text-sm md:text-base transition hover:-translate-y-0.5"
      >
        Login
      </button>
    </form>

    <hr class="border-line my-4 md:my-6" />

    <p class="text-center text-xs md:text-sm text-inksoft">
      Don't have an account?

      <a
        href="{% url 'accounts:register' %}"
        class="text-accent hover:text-accentink font-semibold"
      >
        Register
      </a>
    </p>
  </div>
</div>
{% endblock %}
