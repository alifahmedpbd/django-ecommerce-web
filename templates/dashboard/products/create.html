{% extends "dashboard/base.html" %}

{% block title %}

Add Product

{% endblock %}

{% block dashboard_content %}

<div class="card shadow">

    <div class="card-header">

        <h3>

            Add Product

        </h3>

    </div>

    <div class="card-body">

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-primary">

                Save Product

            </button>

            <a href="{% url 'dashboard:product_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
