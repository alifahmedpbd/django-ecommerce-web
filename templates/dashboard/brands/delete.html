{% extends "dashboard/base.html" %}

{% block title %}

Delete Brand

{% endblock %}

{% block dashboard_content %}

<div class="card shadow-sm">

    <div class="card-body">

        <h3 class="text-danger">

            Delete Brand

        </h3>

        <p>

            Are you sure you want to delete

            <strong>

                {{ brand.name }}

            </strong>

            ?

        </p>

        <form method="POST">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger"
            >

                Delete

            </button>

            <a
                href="{% url 'dashboard:brand_list' %}"
                class="btn btn-secondary"
            >

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
