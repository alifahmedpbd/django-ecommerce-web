{% extends "base.html" %}

{% block title %}
Order Success
{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <div class="card shadow p-5">

        <h1 class="text-success">

            🎉 Order Placed Successfully

        </h1>

        <p class="mt-3">

            Thank you for your order.

        </p>

        <h4>

            Order ID :
            #{{ order.id }}

        </h4>

        <a

            href="{% url 'store:product_list' %}"

            class="btn btn-primary mt-4"

        >

            Continue Shopping

        </a>

    </div>

</div>

{% endblock %}
