{% extends "dashboard/base.html" %}

{% block dashboard_content %}

<div class="card shadow">

    <div class="card-header">

        <h4>{{ title }}</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">

                Save

            </button>

        </form>

    </div>

</div>

{% endblock %}
