{% extends "base.html" %}

{% block title %}
Checkout
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <!-- Shipping Form -->

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-header">

                    <h3>

                        Shipping Information

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                            class="btn btn-success w-100 mt-3"
                        >
                            Place Order
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
