{% extends "dashboard/base.html" %}

{% block dashboard_content %}

<div class="card shadow">

    <div class="card-header">

        <h3>

            Add Category

        </h3>

    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success"
            >

                Save Category

            </button>

            <a
                href="{% url 'dashboard:category_list' %}"
                class="btn btn-secondary"
            >

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
