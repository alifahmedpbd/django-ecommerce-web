{% extends "dashboard/base.html" %}

{% block dashboard_content %}

<h2 class="mb-4">
Low Stock Report
</h2>

<table class="table table-striped">

<thead>

<tr>

<th>Product</th>

<th>Stock</th>

</tr>

</thead>

<tbody>

{% for product in products %}

<tr>

<td>{{ product.name }}</td>

<td>

<span class="badge bg-danger">

{{ product.stock }}

</span>

</td>

</tr>

{% empty %}

<tr>

<td colspan="2">

No Low Stock Products

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
