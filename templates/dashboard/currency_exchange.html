{% extends "dashboard/base.html" %}

{% block title %}
Currency Exchange
{% endblock %}

{% block content %}

<div class="container py-4">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h4 class="mb-0">
                        💱 USD Exchange Rate
                    </h4>

                </div>

                <div class="card-body">

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-success">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Currency

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="{{ exchange_rate.currency }}"
                                readonly
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                1 USD = ৳

                            </label>

                            <input
                                type="number"
                                name="rate"
                                class="form-control"
                                step="0.01"
                                min="0"
                                value="{{ exchange_rate.rate }}"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            💾 Save Exchange Rate

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
