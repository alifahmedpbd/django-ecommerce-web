<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f4f6f9;

    font-family:Arial,Helvetica,sans-serif;

    color:#444;

}

.wrapper{

    width:100%;

    padding:40px 15px;

}

.card{

    max-width:680px;

    margin:auto;

    background:#ffffff;

    border-radius:14px;

    overflow:hidden;

    box-shadow:0 12px 30px rgba(0,0,0,.08);

}

.header{

    background:linear-gradient(135deg,#0d6efd,#2563eb);

    text-align:center;

    padding:35px;

    color:#fff;

}

.header img{

    width:180px;

    margin-bottom:15px;

}

.header h2{

    margin:0;

    font-size:28px;

}

.header p{

    margin-top:8px;

    opacity:.9;

}

.content{

    padding:40px;

    line-height:1.8;

    font-size:15px;

}

.content h2{

    margin-bottom:15px;

}

.content h3{

    margin:20px 0 10px;

}

.content p{

    margin-bottom:12px;

}

hr{

    border:none;

    border-top:1px solid #e5e5e5;

    margin:25px 0;

}

.btn{

    display:inline-block;

    margin-top:25px;

    background:#0d6efd;

    color:#fff !important;

    text-decoration:none;

    padding:14px 30px;

    border-radius:8px;

    font-weight:bold;

}

.footer{

    background:#fafafa;

    border-top:1px solid #eee;

    padding:30px;

    text-align:center;

    color:#777;

    font-size:14px;

}

.footer p{

    margin-bottom:12px;

}

.social{

    margin-top:15px;

}

.social a{

    color:#0d6efd;

    text-decoration:none;

    margin:0 10px;

    font-weight:bold;

}

.copy{

    margin-top:20px;

    font-size:13px;

    color:#999;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<div class="header">

<a href="{{ site_url }}">

<img
src="{{ site_url }}/static/images/logo.png"
alt="Shopora">

</a>

<h2>Shopora</h2>

<p>Shop More • Pay Less</p>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

<div class="footer">

<p>
Thank you for choosing <strong>Shopora ❤️</strong>
</p>

<p>
Need help? Contact our support anytime.
</p>

<div class="social">

<a href="https://facebook.com">Facebook</a>

|

<a href="https://instagram.com">Instagram</a>

|

<a href="{{ site_url }}">Website</a>

</div>

<div class="copy">

© {% now "Y" %} Shopora. All Rights Reserved.

</div>

</div>

</div>

</div>

</body>

</html>
